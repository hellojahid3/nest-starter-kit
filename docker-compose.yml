services:
  pg:
    image: postgres:16-alpine
    container_name: pg
    environment:
      POSTGRES_DB: nestapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nest-app-network
    restart: unless-stopped

  redis:
    image: redis/redis-stack:latest
    container_name: app-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - nest-app-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-server
    environment:
      NODE_ENV: production
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nest-app-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

networks:
  nest-app-network:
    driver: bridge
